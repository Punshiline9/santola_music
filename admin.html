<!doctype html>
<html lang="pt-pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SANTOLA ADMIN | Painel de Moderação</title>
    <style>
      body {
        font-family: sans-serif;
        /* Fundo escuro Santola (#080808) com filtro sobre a bandeira */
        background:
          linear-gradient(rgba(8, 8, 8, 0.9), rgba(8, 8, 8, 0.9)),
          url("LINK_DA_SUA_BANDEIRA_AQUI.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        padding: 20px;
        margin: 0;
        min-height: 100vh;
      }
      .grid {
        display: grid;
        gap: 20px;
      }
      .card {
        background: #1a1a1a;
        padding: 20px;
        border-radius: 10px;
        border-left: 5px solid #ffdb00; /* Amarelo Santola */
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
      }
      .info-musica {
        word-break: break-word;
      }
      .botoes-acao {
        display: flex;
        gap: 10px;
      }
      .btn-ok {
        background: #12ad2b; /* Verde Santola */
        color: white;
        padding: 10px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        border-radius: 4px;
      }
      .btn-no {
        background: #d21034; /* Vermelho Santola */
        color: white;
        padding: 10px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        border-radius: 4px;
      }
      #login {
        position: fixed;
        inset: 0;
        background: #080808; /* Fundo Escuro Santola */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        padding: 20px;
        text-align: center;
      }
      input {
        padding: 15px;
        margin-bottom: 15px;
        width: 100%;
        max-width: 300px;
        box-sizing: border-box;
        border-radius: 5px;
        border: none;
      }
      #login button {
        width: 100%;
        max-width: 300px;
      }
    </style>
  </head>
  <body>
    <div id="login">
      <h1>SANTOLA ADMIN</h1>
      <input type="password" id="pass" placeholder="Código de Acesso" />
      <button class="btn-ok" onclick="entrar()">ENTRAR</button>
    </div>

    <h1>Músicas Pendentes</h1>
    <div id="lista" class="grid"></div>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbxZ26-7vADjeoigibMc-a1KvR-Tj0iFqJDjjY-rf5TuZ70nofOvBeP4smlrN9c_n6wp/exec";
      const PASS_CORRETA = ".Pancho11.";

      window.onload = () => {
        if (sessionStorage.getItem("adminLogado") === "true") {
          document.getElementById("login").style.display = "none";
          carregar();
        }
      };

      function entrar() {
        if (document.getElementById("pass").value === PASS_CORRETA) {
          sessionStorage.setItem("adminLogado", "true");
          document.getElementById("login").style.display = "none";
          carregar();
        } else {
          alert("Acesso negado");
        }
      }

      async function carregar() {
        const res = await fetch(SCRIPT_URL + "?type=pendentes");
        const data = await res.json();
        const div = document.getElementById("lista");
        div.innerHTML = data.length ? "" : "Nada para aprovar!";
        data.forEach((m) => {
          div.innerHTML += `
                    <div class="card" id="row-${m.row}">
                        <div class="info-musica">
                            <b>${m.artista}</b> - ${m.titulo} <br>
                            <a href="${m.urlMusica}" target="_blank" style="color: #12ad2b; text-decoration: none; font-weight: bold; margin-top: 5px; display: inline-block;">Ouvir</a>
                        </div>
                        <div class="botoes-acao">
                            <button class="btn-ok" onclick="acao(${m.row}, 'approve')">APROVAR</button>
                            <button class="btn-no" onclick="acao(${m.row}, 'delete')">ELIMINAR</button>
                        </div>
                    </div>`;
        });
      }

      async function acao(row, act) {
        await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ action: act, row: row }),
        });
        document.getElementById(`row-${row}`).remove();
      }
    </script>
  </body>
</html>
