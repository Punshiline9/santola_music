<script>
    let musicasGerais = [];
    const LOGO_PADRAO = "https://i.postimg.cc/RhnRhFNj/Logo-STP.png";
    const NOME_BLOG = "Santola Music";
    const SLOGAN_BLOG = "O Blog das Ilhas";

    // Função para remover acentos e facilitar a filtragem inteligente
    function normalizar(texto) {
        if (!texto) return "";
        return texto.toString().toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "");
    }

    window.onload = async () => {
        try {
            const r = await fetch("musicas.json");
            const dadosRaw = await r.json();

            // TRATAMENTO INTELIGENTE: Organiza os dados independente de como foram escritos no JSON
            musicasGerais = dadosRaw.map(m => {
                return {
                    artista: m.artista && m.artista.trim() !== "" ? m.artista : NOME_BLOG,
                    titulo: (m.titulo || m.título) && (m.titulo || m.título).trim() !== "" ? (m.titulo || m.título) : SLOGAN_BLOG,
                    categoria: m.categoria || m.gênero || "Internacional", // Se não houver categoria, vai para Internacional
                    link: m.link || m.link_download || "#",
                    capa: m.capa && m.capa.trim() !== "" ? m.capa : LOGO_PADRAO
                };
            });
        } catch (e) {
            console.error("Erro ao carregar ou processar o JSON");
        }
        
        setTimeout(() => {
            document.getElementById("loader-overlay").style.opacity = "0";
            setTimeout(() => (document.getElementById("loader-overlay").style.display = "none"), 500);
        }, 800);
    };

    function filtrar(estilo) {
        const menu = document.getElementById("menu-view"),
              result = document.getElementById("result-view"),
              lista = document.getElementById("lista-musicas"),
              titulo = document.getElementById("cat-titulo");

        const termoAlvo = normalizar(estilo);

        // BUSCA INTELIGENTE: Filtra ignorando acentos e maiúsculas
        const filtradas = musicasGerais.filter(m => {
            const catMusica = normalizar(m.categoria);
            // Se clicar em "Internacionais", busca por "internacional" ou musicas sem categoria definida
            if (termoAlvo === "internacional") {
                return catMusica.includes("internacional") || catMusica === "";
            }
            return catMusica.includes(termoAlvo);
        });

        titulo.innerText = estilo;
        menu.style.display = "none";
        result.style.display = "block";

        if (filtradas.length === 0) {
            lista.innerHTML = `<p style="text-align:center; padding:40px; color:#666;">Nenhuma música encontrada em ${estilo}.</p>`;
        } else {
            lista.innerHTML = filtradas.map(m => `
                <div class="music-row">
                    <img src="${m.capa}" class="artist-thumb" onerror="this.src='${LOGO_PADRAO}'">
                    <div style="flex:1">
                        <strong style="font-size:1.1rem">${m.artista}</strong><br>
                        <small style="color:var(--amarelo)">${m.titulo}</small>
                    </div>
                    <a href="${m.link}" class="btn-baixar-cat" target="_blank">BAIXAR</a>
                </div>
            `).join("");
        }
        window.scrollTo(0, 0);
    }

    function voltarMenu() {
        document.getElementById("menu-view").style.display = "block";
        document.getElementById("result-view").style.display = "none";
        window.scrollTo(0, 0);
    }
</script>
