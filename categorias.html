<!doctype html>
<html lang="pt-pt">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Categorias | Santola Music</title>
    <link
      rel="icon"
      type="image/png"
      href="https://i.postimg.cc/RhnRhFNj/Logo-STP.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --verde: #12ad2b;
        --amarelo: #ffdb00;
        --vermelho: #d21034;
        --glass: rgba(255, 255, 255, 0.05);
        --border: rgba(255, 255, 255, 0.1);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        background-color: #080808;
        color: white;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Splash Screen */
      #loader-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #080808;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.5s ease;
        pointer-events: none;
      }
      .loader-logo {
        width: 120px;
        animation: pulse 1.5s infinite;
        filter: drop-shadow(0 0 15px var(--amarelo));
      }
      @keyframes pulse {
        0%, 100% { transform: scale(0.95); }
        50% { transform: scale(1.05); }
      }

      /* Header */
      header {
        padding: 2.5rem 1rem;
        text-align: center;
        border-bottom: 1px solid var(--border);
        background: rgba(8, 8, 8, 0.95);
        position: relative;
      }
      .btn-voltar {
        position: absolute;
        left: 15px;
        top: 15px;
        background: var(--glass);
        border: 1px solid var(--amarelo);
        color: var(--amarelo);
        padding: 8px 14px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        font-size: 0.7rem;
        transition: 0.3s;
        z-index: 10;
      }
      .btn-voltar:hover {
        background: var(--amarelo);
        color: black;
        box-shadow: 0 0 15px var(--amarelo);
      }
      .logo-texto {
        font-family: "Syne";
        font-size: 2.8rem;
        font-weight: 800;
        background: linear-gradient(to right, var(--verde), var(--amarelo), var(--vermelho));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.5));
      }
