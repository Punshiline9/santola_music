<!doctype html>
<html lang="pt-pt">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Estilos Musicais | Santola Music</title>

    <link
      rel="icon"
      type="image/png"
      href="https://i.postimg.cc/RhnRhFNj/Logo-STP.png"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --verde: #12ad2b;
        --amarelo: #ffdb00;
        --vermelho: #d21034;
        --glass: rgba(255, 255, 255, 0.05);
        --border: rgba(255, 255, 255, 0.12);
        --preto-deep: #080808;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

        /* Gradients das Categorias */
        --grad-kizomba: linear-gradient(135deg, #1a2a6c, #b21f1f);
        --grad-puxita: linear-gradient(135deg, #12ad2b, #0a6b1a);
        --grad-stp: linear-gradient(135deg, #f09819, #edde5d);
        --grad-angola: linear-gradient(135deg, #d21034, #7a091d);
        --grad-rap: linear-gradient(135deg, #333, #000);
        --grad-brazil: linear-gradient(135deg, #009739, #fedd00);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--preto-deep);
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 10px;
      }

      body {
        background-color: var(--preto-deep);
        color: white;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* HEADER */
      header {
        padding: 1.5rem 1rem;
        text-align: center;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: rgba(8, 8, 8, 0.95);
        z-index: 1000;
        backdrop-filter: blur(15px);
      }
      .btn-voltar {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: var(--verde);
        color: white;
        padding: 8px 14px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 800;
        font-size: 0.65rem;
        text-transform: uppercase;
        border-bottom: 3px solid #0a6b1a;
        transition: var(--transition);
      }
      .btn-voltar:hover {
        background: white;
        color: black;
        transform: translateY(-50%) scale(1.05);
      }

      .logo-texto {
        font-family: "Syne";
        font-size: 1.6rem;
        font-weight: 800;
        background: linear-gradient(
          to right,
          var(--verde),
          var(--amarelo),
          var(--vermelho)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .main-content {
        max-width: 800px;
        margin: 0 auto;
        padding: 1.5rem;
      }
      .titulo-secao {
        font-family: "Syne";
        text-align: left;
        margin: 1.5rem 0;
        color: #fff;
        font-size: 1.3rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-left: 5px solid var(--verde);
        padding-left: 15px;
      }

      /* BUSCA RÁPIDA */
      .search-container {
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 4px 15px;
        width: 100%;
        margin-bottom: 25px;
        transition: var(--transition);
        display: flex;
        align-items: center;
      }
      .search-container:focus-within {
        border-color: var(--amarelo);
        box-shadow: 0 0 15px rgba(255, 219, 0, 0.2);
      }
      .search-container input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: white;
        font-size: 1rem;
        padding: 12px;
      }

      /* GRID CATEGORIAS */
      .grid-categorias {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
      .cat-card {
        position: relative;
        height: 130px;
        border-radius: 22px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 18px;
        text-decoration: none;
        overflow: hidden;
        transition: var(--transition);
        border: 1px solid var(--border);
        cursor: pointer;
        animation: fadeIn 0.5s ease backwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .cat-card:hover {
        transform: translateY(-5px);
        border-color: var(--amarelo);
        filter: brightness(1.1);
      }
      .cat-card strong {
        font-family: "Syne";
        font-size: 1.1rem;
        text-transform: uppercase;
        z-index: 2;
        color: #fff;
        line-height: 1.2;
      }
      .cat-card span {
        font-size: 0.6rem;
        opacity: 0.9;
        z-index: 2;
        text-transform: uppercase;
        font-weight: 800;
        color: #fff;
        background: rgba(0, 0, 0, 0.3);
        padding: 2px 6px;
        border-radius: 4px;
        width: fit-content;
        margin-bottom: 5px;
      }

      .cat-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
        z-index: 1;
      }

      /* LISTA DE MÚSICAS (RESULTADOS) */
      .music-item {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.03);
        padding: 14px;
        border-radius: 18px;
        margin-bottom: 12px;
        border: 1px solid var(--border);
        transition: var(--transition);
      }
      .music-item:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateX(5px);
        border-color: var(--amarelo);
      }

      .m-capa {
        width: 55px;
        height: 55px;
        border-radius: 12px;
        object-fit: cover;
        margin-right: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .m-info {
        flex: 1;
        min-width: 0;
      }
      .m-info h4 {
        font-size: 1rem;
        margin-bottom: 3px;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .m-info p {
        font-size: 0.8rem;
        color: var(--amarelo);
        font-weight: 600;
      }

      .btn-download-trigger {
        background: var(--amarelo);
        color: black;
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font-size: 1.2rem;
        font-weight: 800;
        transition: var(--transition);
      }
      .btn-download-trigger:hover {
        background: white;
        transform: scale(1.1);
      }

      /* MODAL PROFISSIONAL */
      #downloadModal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.95);
        z-index: 10000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        backdrop-filter: blur(15px);
      }
      .modal-card {
        background: #111;
        border: 2px solid var(--amarelo);
        padding: 30px;
        border-radius: 32px;
        width: 100%;
        max-width: 380px;
        text-align: center;
        position: relative;
        animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      @keyframes modalPop {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .btn-close-modal {
        position: absolute;
        right: 20px;
        top: 15px;
        background: none;
        border: none;
        color: white;
        font-size: 2rem;
        cursor: pointer;
      }

      .btn-final-download {
        display: block;
        width: 100%;
        background: var(--verde);
        color: white;
        padding: 16px;
        border-radius: 16px;
        text-decoration: none;
        font-weight: 800;
        text-transform: uppercase;
        margin-top: 20px;
        border-bottom: 4px solid #0a6b1a;
        transition: 0.2s;
      }
      .btn-final-download:active {
        transform: translateY(2px);
        border-bottom-width: 0;
      }

      .btn-copy-link {
        display: block;
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        color: #888;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #333;
        margin-top: 10px;
        font-size: 0.75rem;
        font-weight: 800;
        cursor: pointer;
        text-transform: uppercase;
      }

      footer {
        padding: 4rem 1rem;
        text-align: center;
        border-top: 1px solid var(--border);
        margin-top: 30px;
      }
      .dev-name {
        color: var(--amarelo);
        font-size: 1.1rem;
        font-weight: 800;
        text-transform: uppercase;
        display: block;
        margin-top: 5px;
      }

      /* CORES DAS CATEGORIAS */
      .novidades {
        background: linear-gradient(135deg, #00c6ff, #0072ff);
      }
      .populares {
        background: linear-gradient(135deg, #f09819, #edde5d);
      }
      .kizomba {
        background: var(--grad-kizomba);
      }
      .brazil {
        background: var(--grad-brazil);
      }
      .angola {
        background: var(--grad-angola);
      }
      .stp {
        background: var(--grad-stp);
      }
      .rap {
        background: var(--grad-rap);
      }
      .internacional {
        background: var(--grad-inter);
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html" class="btn-voltar">Voltar</a>
      <div class="logo-texto">Santola Music</div>
    </header>

    <main class="main-content">
      <div id="menu-view">
        <h2 class="titulo-secao">Explorar Estilos 📂</h2>

        <div class="search-container">
          <input
            type="text"
            id="mainSearch"
            placeholder="Artista, música ou estilo..."
            oninput="motorDeBusca()"
          />
        </div>

        <div class="grid-categorias" id="grid-home">
          <p
            style="
              text-align: center;
              grid-column: span 2;
              opacity: 0.5;
              padding: 40px;
            "
          >
            A organizar estantes musicais...
          </p>
        </div>
      </div>

      <div id="result-view" style="display: none">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
          "
        >
          <h2 id="cat-titulo" class="titulo-secao" style="margin: 0"></h2>
          <button
            onclick="voltarMenu()"
            style="
              background: var(--glass);
              border: 1px solid var(--border);
              color: var(--amarelo);
              padding: 8px 15px;
              border-radius: 10px;
              font-weight: 800;
              font-size: 0.7rem;
              cursor: pointer;
            "
          >
            FECHAR ✕
          </button>
        </div>
        <div id="lista-musicas"></div>
      </div>
    </main>

    <div id="downloadModal">
      <div class="modal-card">
        <button class="btn-close-modal" onclick="fecharModal()">&times;</button>
        <img
          id="mCapa"
          src=""
          style="
            width: 130px;
            height: 130px;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: block;
            border: 3px solid var(--amarelo);
          "
        />
        <h3
          id="mArtista"
          style="color: white; font-family: &quot;Syne&quot;; font-size: 1.4rem"
        ></h3>
        <p
          id="mTitulo"
          style="
            color: var(--amarelo);
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: 600;
          "
        ></p>

        <a id="mLink" href="#" class="btn-final-download">Baixar MP3</a>

        <button id="btnCopy" class="btn-copy-link" onclick="copiarLinkPost()">
          🔗 Copiar Link do Post
        </button>

        <p
          style="
            margin-top: 20px;
            font-size: 0.65rem;
            opacity: 0.4;
            letter-spacing: 1px;
          "
        >
          SANTOLA MUSIC - O BLOG DAS ILHAS
        </p>
      </div>
    </div>

    <footer>
      <p style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.5">
        DESENVOLVIDO POR
      </p>
      <strong class="dev-name">Pacheco Gonçalves</strong>
      <p style="font-size: 0.6rem; opacity: 0.3; margin-top: 15px">
        © 2026 SÃO TOMÉ E PRÍNCIPE
      </p>
    </footer>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbyvtkJfAINnNcJQoZAERjykSdaLuIK1IrdbbnooFmf-hJ7ACWxfihwRYGoTmMJ2cGpx/exec";
      const LOGO_PADRAO = "https://i.postimg.cc/RhnRhFNj/Logo-STP.png";

      let musicasGerais = []; // Base de dados unificada
      let linkParaCopiar = "";

      // Definição das Categorias e Mapeamento
      const ESTILOS = [
        { nome: "Novidades", filtro: "NOVIDADE", classe: "novidades" },
        { nome: "Top Kizomba", filtro: "KIZOMBA_ZOUK", classe: "kizomba" },
        { nome: "Top STP", filtro: "TOP_STP", classe: "stp" },
        { nome: "Top Angola", filtro: "TOP_ANGOLA", classe: "angola" },
        { nome: "Top Brazil", filtro: "TOP_BRAZIL", classe: "brazil" },
        { nome: "RAP / Hip-Hop", filtro: "RAP", classe: "rap" },
        {
          nome: "Beats & Instrumentais",
          filtro: "BEATS",
          classe: "internacional",
        },
        {
          nome: "Internacional",
          filtro: "INTERNACIONAL",
          classe: "internacional",
        },
      ];

      // Inicialização
      async function iniciar() {
        try {
          // 1. Carregar JSON Local
          const resJ = await fetch("musicas.json");
          const dadosJson = await resJ.json();

          let listaCompilada = [];

          // "Achatar" o JSON categorizado para uma lista simples
          Object.keys(dadosJson).forEach((chave) => {
            if (Array.isArray(dadosJson[chave])) {
              dadosJson[chave].forEach((m) => {
                listaCompilada.push({
                  artista: m.artista,
                  titulo: m.titulo,
                  capa: m.capa || LOGO_PADRAO,
                  link: m.url || "#",
                  categoria: chave,
                  popular: m.downloads > 1000,
                });
              });
            }
          });

          // 2. Carregar do Google Drive (Híbrido)
          try {
            const resG = await fetch(SCRIPT_URL + "?type=aprovados");
            const dadosGoogle = await resG.json();
            const listaGoogle = dadosGoogle.map((m) => ({
              artista: m.artista,
              titulo: m.titulo,
              capa: m.urlCapa || LOGO_PADRAO,
              link: m.urlMusica,
              categoria: m.genero || "PENDENTES",
              popular: false,
              isGoogle: true,
            }));
            musicasGerais = [...listaGoogle, ...listaCompilada];
          } catch (e) {
            musicasGerais = listaCompilada;
            console.warn("Google Drive Offline");
          }

          renderizarGrid();
          verificarDeepLink();
        } catch (e) {
          console.error("Erro ao carregar base de dados:", e);
        }
      }

      // Renderiza os Cards de Categoria
      function renderizarGrid() {
        const grid = document.getElementById("grid-home");
        grid.innerHTML = ESTILOS.map((estilo, index) => {
          let total = 0;
          if (estilo.filtro === "NOVIDADE") {
            total = musicasGerais.length > 20 ? 20 : musicasGerais.length;
          } else {
            total = musicasGerais.filter((m) =>
              norm(m.categoria).includes(norm(estilo.filtro)),
            ).length;
          }

          return `
            <div class="cat-card ${estilo.classe}" style="animation-delay: ${index * 0.05}s" onclick="filtrar('${estilo.filtro}', '${estilo.nome}')">
              <span>${total} Músicas</span>
              <strong>${estilo.nome}</strong>
            </div>`;
        }).join("");
      }

      // Filtra e exibe a lista de músicas
      function filtrar(filtro, nomeExibicao) {
        let filtradas = [];
        if (filtro === "NOVIDADE") {
          filtradas = [...musicasGerais].reverse().slice(0, 20);
        } else {
          filtradas = musicasGerais.filter((m) =>
            norm(m.categoria).includes(norm(filtro)),
          );
        }

        document.getElementById("cat-titulo").innerText = nomeExibicao;
        document.getElementById("menu-view").style.display = "none";
        document.getElementById("result-view").style.display = "block";

        const lista = document.getElementById("lista-musicas");
        if (filtradas.length === 0) {
          lista.innerHTML =
            '<div style="text-align:center; padding:50px; opacity:0.5;"><p>🔍 Categoria vazia no momento.</p></div>';
        } else {
          lista.innerHTML = filtradas
            .map(
              (m) => `
            <div class="music-item">
              <img src="${m.capa}" class="m-capa" onerror="this.src='${LOGO_PADRAO}'">
              <div class="m-info">
                <h4>${m.artista}</h4>
                <p>${m.titulo}</p>
              </div>
              <button onclick="abrirModal('${encodeURIComponent(JSON.stringify(m))}')" class="btn-download-trigger">↓</button>
            </div>`,
            )
            .join("");
        }
        window.scrollTo(0, 0);
      }

      // Motor de Pesquisa Inteligente
      function motorDeBusca() {
        const termo = norm(document.getElementById("mainSearch").value);
        if (termo.length < 2) {
          return;
        }

        const filtradas = musicasGerais.filter(
          (m) =>
            norm(m.artista).includes(termo) || norm(m.titulo).includes(termo),
        );

        document.getElementById("cat-titulo").innerText = "Resultados";
        document.getElementById("menu-view").style.display = "none";
        document.getElementById("result-view").style.display = "block";

        const lista = document.getElementById("lista-musicas");
        lista.innerHTML =
          filtradas.length > 0
            ? filtradas
                .map(
                  (m) => `
            <div class="music-item">
              <img src="${m.capa}" class="m-capa" onerror="this.src='${LOGO_PADRAO}'">
              <div class="m-info">
                <h4>${m.artista}</h4>
                <p>${m.titulo}</p>
              </div>
              <button onclick="abrirModal('${encodeURIComponent(JSON.stringify(m))}')" class="btn-download-trigger">↓</button>
            </div>`,
                )
                .join("")
            : '<p style="text-align:center; padding:50px; opacity:0.5;">Nenhuma música encontrada.</p>';
      }

      // Modal e Deep Linking
      function abrirModal(data) {
        const m = JSON.parse(decodeURIComponent(data));
        document.getElementById("mCapa").src = m.capa;
        document.getElementById("mArtista").innerText = m.artista;
        document.getElementById("mTitulo").innerText = m.titulo;
        document.getElementById("mLink").href = m.link;

        // Gerar link de partilha
        const urlBase = window.location.origin + window.location.pathname;
        linkParaCopiar = `${urlBase}?artista=${encodeURIComponent(m.artista)}&titulo=${encodeURIComponent(m.titulo)}`;

        document.getElementById("downloadModal").style.display = "flex";
      }

      async function copiarLinkPost() {
        try {
          await navigator.clipboard.writeText(linkParaCopiar);
          const btn = document.getElementById("btnCopy");
          btn.innerText = "✅ LINK COPIADO!";
          setTimeout(() => (btn.innerText = "🔗 COPIAR LINK DO POST"), 2000);
        } catch (e) {
          alert("Erro ao copiar link.");
        }
      }

      function fecharModal() {
        document.getElementById("downloadModal").style.display = "none";
      }

      function voltarMenu() {
        document.getElementById("menu-view").style.display = "block";
        document.getElementById("result-view").style.display = "none";
        document.getElementById("mainSearch").value = "";
      }

      function norm(txt) {
        return txt
          ? txt
              .toString()
              .toLowerCase()
              .normalize("NFD")
              .replace(/[\u0300-\u036f]/g, "")
              .trim()
          : "";
      }

      function verificarDeepLink() {
        const params = new URLSearchParams(window.location.search);
        const art = params.get("artista");
        const tit = params.get("titulo");
        if (art && tit) {
          const m = musicasGerais.find(
            (x) =>
              norm(x.artista) === norm(art) && norm(x.titulo) === norm(tit),
          );
          if (m) abrirModal(encodeURIComponent(JSON.stringify(m)));
        }
      }

      window.onload = iniciar;
    </script>
  </body>
</html>
