<!doctype html>
<html lang="pt-pt">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Playlists | Santola Music</title>
    <link
      rel="icon"
      type="image/png"
      href="https://i.postimg.cc/RhnRhFNj/Logo-STP.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --verde: #12ad2b;
        --amarelo: #ffdb00;
        --vermelho: #d21034;
        --glass: rgba(255, 255, 255, 0.05);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      body {
        background: #080808;
        color: white;
        min-height: 100vh;
        overflow-x: hidden;
      }

      header {
        padding: 2rem;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .main-content {
        max-width: 900px;
        margin: 0 auto;
        padding: 1.5rem;
      }

      /* BOTÃO GATILHO DA PLAYLIST (IGUAL AOS OUTROS DO SITE) */
      .trigger-playlist {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        color: var(--amarelo);
        border: 2px solid var(--amarelo);
        border-bottom: 5px solid #857200;
        padding: 22px;
        border-radius: 18px;
        text-decoration: none;
        font-weight: 900;
        font-size: 0.85rem;
        text-transform: uppercase;
        margin-bottom: 2rem;
        cursor: pointer;
        width: 100%;
        transition: 0.2s;
      }
      .trigger-playlist:active {
        transform: translateY(3px);
        border-bottom-width: 2px;
      }

      /* OVERLAY DO LEITOR (ECRÃ CHEIO) */
      #playlist-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 10000;
        display: none; /* Escondido por padrão */
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .video-container {
        width: 100%;
        max-width: 800px;
        position: relative;
        padding-bottom: 56.25%; /* 16:9 */
        height: 0;
        border-radius: 20px;
        overflow: hidden;
        border: 2px solid var(--amarelo);
      }
      .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .btn-fechar {
        margin-top: 20px;
        background: var(--vermelho);
        color: white;
        border: none;
        padding: 15px 40px;
        border-radius: 50px;
        font-weight: 800;
        cursor: pointer;
        text-transform: uppercase;
      }

      /* GRID DE ÁLBUNS ABAIXO */
      .grid-albuns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      .album-card {
        background: var(--glass);
        border-radius: 20px;
        padding: 15px;
        text-align: center;
        border-bottom: 5px solid var(--vermelho);
        text-decoration: none;
        color: white;
      }
      .album-capa {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 15px;
        object-fit: cover;
        margin-bottom: 10px;
      }

      .btn-voltar-topo {
        display: block;
        background: white;
        color: black;
        padding: 15px;
        border-radius: 15px;
        text-align: center;
        text-decoration: none;
        font-weight: bold;
        margin-bottom: 20px;
      }

      @media (max-width: 500px) {
        .grid-albuns {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1 style="font-family: &quot;Syne&quot;; color: var(--amarelo)">
        PLAYLISTS & ÁLBUNS
      </h1>
    </header>

    <main class="main-content">
      <a href="index.html" class="btn-voltar-topo">⬅ VOLTAR AO INÍCIO</a>

      <div class="trigger-playlist" onclick="abrirPlaylist()">
        OUVIR SANTOLA HITS 2026 🎵
      </div>

      <div class="grid-albuns" id="lista-playlists"></div>
    </main>

    <div id="playlist-overlay">
      <div class="video-container">
        <iframe
          id="yt-player"
          src=""
          title="YouTube video player"
          allow="autoplay; encrypted-media"
          allowfullscreen
        >
        </iframe>
      </div>
      <button class="btn-fechar" onclick="fecharPlaylist()">
        FECHAR LEITOR X
      </button>
    </div>

    <script>
      const playlistID = "PLp0SUp_yOsq0_Y8DqXfT_K6oXv8_Z-k1P"; // <--- COLOQUE SEU ID AQUI

      function abrirPlaylist() {
        const overlay = document.getElementById("playlist-overlay");
        const iframe = document.getElementById("yt-player");
        // Só carrega o vídeo quando clica para não pesar o site
        iframe.src = `https://www.youtube.com/embed/videoseries?list=${playlistID}&autoplay=1`;
        overlay.style.display = "flex";
        document.body.style.overflow = "hidden"; // Impede scroll ao fundo
      }

      function fecharPlaylist() {
        const overlay = document.getElementById("playlist-overlay");
        const iframe = document.getElementById("yt-player");
        iframe.src = ""; // Para a música ao fechar
        overlay.style.display = "none";
        document.body.style.overflow = "auto";
      }

      // Carregar álbuns do JSON
      window.onload = async () => {
        try {
          const r = await fetch("musicas.json");
          const dados = await r.json();
          const playlists = dados.filter((m) =>
            ["PLAYLISTS", "ALBUNS", "ALBUM"].includes(
              m.categoria.toUpperCase(),
            ),
          );

          document.getElementById("lista-playlists").innerHTML = playlists
            .map(
              (p) => `
            <a href="${p.link}" class="album-card">
                <img src="${p.capa || "https://i.postimg.cc/RhnRhFNj/Logo-STP.png"}" class="album-capa">
                <strong>${p.artista}</strong><br><small>${p.titulo}</small>
            </a>
          `,
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      };
    </script>
  </body>
</html>
