<!doctype html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Playlists | Santola Music</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/RhnRhFNj/Logo-STP.png" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        :root { --verde: #12ad2b; --amarelo: #ffdb00; --vermelho: #d21034; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
        body { background: #080808; color: white; min-height: 100vh; }

        header { padding: 2rem; text-align: center; border-bottom: 1px solid var(--glass); }
        .main-content { max-width: 900px; margin: 0 auto; padding: 1.5rem; }

        /* BOTÃO DE CIMA */
        .trigger-playlist {
            display: flex; align-items: center; justify-content: center;
            background: #111; color: var(--amarelo); border: 2px solid var(--amarelo);
            border-bottom: 5px solid #857200; padding: 20px; border-radius: 18px;
            font-weight: 900; text-transform: uppercase; margin-bottom: 2rem; cursor: pointer;
        }

        /* GRID DE PLAYLISTS */
        .grid-albuns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .album-card {
            background: var(--glass); border-radius: 20px; padding: 15px; text-align: center;
            border-bottom: 5px solid var(--vermelho); cursor: pointer; text-decoration: none; color: white;
        }
        .album-capa { width: 100%; aspect-ratio: 1; border-radius: 15px; object-fit: cover; margin-bottom: 10px; }

        /* LEITOR OVERLAY (MODO CINEMA) */
        #playlist-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); z-index: 10000;
            display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .video-container { width: 100%; max-width: 800px; aspect-ratio: 16/9; border: 2px solid var(--amarelo); border-radius: 15px; overflow: hidden; }
        .btn-fechar { margin-top: 20px; background: var(--vermelho); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; }

        @media (max-width: 500px) { .grid-albuns { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1 style="font-family: 'Syne'; color: var(--amarelo)">PLAYLISTS</h1>
    </header>

    <main class="main-content">
        <div class="trigger-playlist" onclick="abrirPlayer('PLpVxR8mT2qwiSN8VX_LdVGyp5SVRh4Y92')">
            OUVIR SANTOLA HITS 2026 🎵
        </div>

        <div class="grid-albuns" id="lista-playlists">
            </div>
    </main>

    <div id="playlist-overlay">
        <div class="video-container">
            <iframe id="yt-player" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <button class="btn-fechar" onclick="fecharPlayer()">FECHAR X</button>
    </div>

    <script>
        function abrirPlayer(id) {
            const overlay = document.getElementById('playlist-overlay');
            const iframe = document.getElementById('yt-player');
            iframe.src = `https://www.youtube.com/embed/videoseries?list=${id}&autoplay=1`;
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function fecharPlayer() {
            const overlay = document.getElementById('playlist-overlay');
            document.getElementById('yt-player').src = "";
            overlay.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = async () => {
            try {
                const r = await fetch("musicas.json");
                const dados = await r.json();
                const container = document.getElementById("lista-playlists");

                container.innerHTML = dados.filter(m => ["PLAYLISTS", "ALBUNS"].includes(m.categoria.toUpperCase())).map(p => {
                    // Se o link for um ID do YouTube (começa com PL), usa o abrirPlayer
                    const acao = p.link.startsWith('PL') ? `onclick="abrirPlayer('${p.link}')"` : `href="${p.link}"`;
                    
                    return `
                        <div class="album-card" ${acao}>
                            <img src="${p.capa}" class="album-capa">
                            <strong>${p.artista}</strong><br>
                            <small>${p.titulo}</small>
                        </div>
                    `;
                }).join("");
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
