<!doctype html>
<html lang="pt-pt">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Playlists | Santola Music</title>
    <link
      rel="icon"
      type="image/png"
      href="https://i.postimg.cc/RhnRhFNj/Logo-STP.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --verde: #12ad2b;
        --amarelo: #ffdb00;
        --vermelho: #d21034;
        --glass: rgba(255, 255, 255, 0.05);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      body {
        background: #080808;
        color: white;
        min-height: 100vh;
      }

      #loader-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #080808;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.5s;
      }
      .loader-logo {
        width: 120px;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.1);
        }
      }

      header {
        padding: 2rem;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .main-content {
        max-width: 900px;
        margin: 0 auto;
        padding: 1.5rem;
      }

      /* SEÇÃO DO PLAYER DESTAQUE */
      .playlist-destaque {
        background: var(--glass);
        border: 2px solid var(--verde);
        border-radius: 24px;
        padding: 15px;
        margin-bottom: 2rem;
      }
      .video-responsive {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        border-radius: 15px;
        background: #000;
      }
      .video-responsive iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      /* GRID DE ÁLBUNS */
      .grid-albuns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .album-card {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 15px;
        text-align: center;
        border-bottom: 5px solid var(--vermelho);
        text-decoration: none;
        color: white;
        transition: 0.3s;
      }
      .album-card:hover {
        transform: scale(1.02);
        background: rgba(255, 255, 255, 0.1);
      }
      .album-capa {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 15px;
        object-fit: cover;
        margin-bottom: 10px;
      }

      .btn-voltar-fixo {
        display: block;
        background: white;
        color: black;
        padding: 15px;
        border-radius: 15px;
        text-align: center;
        text-decoration: none;
        font-weight: bold;
        border-bottom: 5px solid #ccc;
        margin-bottom: 20px;
      }

      @media (max-width: 500px) {
        .grid-albuns {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="loader-overlay">
      <img
        src="https://i.postimg.cc/RhnRhFNj/Logo-STP.png"
        alt="Logo"
        class="loader-logo"
      />
    </div>

    <header>
      <h1 style="font-family: &quot;Syne&quot;; color: var(--amarelo)">
        PLAYLISTS & ÁLBUNS
      </h1>
    </header>

    <main class="main-content">
      <a href="index.html" class="btn-voltar-fixo">⬅ VOLTAR AO INÍCIO</a>

      <section class="playlist-destaque">
        <h2
          style="
            font-family: &quot;Syne&quot;;
            color: var(--amarelo);
            margin-bottom: 15px;
            font-size: 1.1rem;
            text-align: center;
          "
        >
          SANTOLA HITS 2026 🌍
        </h2>
        <div class="video-responsive">
          <iframe
            src="https://www.youtube.com/embed/videoseries?list=PLp0SUp_yOsq0_Y8DqXfT_K6oXv8_Z-k1P"
            allowfullscreen
          >
          </iframe>
        </div>
      </section>

      <div class="grid-albuns" id="lista-playlists"></div>
    </main>

    <script>
      // Função para abrir o leitor (Modo Cinema)
      function abrirPlayerYoutube(idPlaylist) {
        const overlay = document.getElementById("playlist-overlay");
        const iframe = document.getElementById("yt-player");

        iframe.src = `https://www.youtube.com/embed/videoseries?list=${idPlaylist}&autoplay=1`;

        overlay.style.display = "flex";
        document.body.style.overflow = "hidden";
      }

      function fecharPlaylist() {
        const overlay = document.getElementById("playlist-overlay");
        const iframe = document.getElementById("yt-player");
        iframe.src = "";
        overlay.style.display = "none";
        document.body.style.overflow = "auto";
      }

      window.onload = async () => {
        try {
          const r = await fetch("musicas.json");
          const dados = await r.json();

          const cont = document.getElementById("lista-playlists");
          cont.innerHTML = ""; // Limpa antes de carregar

          dados.forEach((item) => {
            // Verifica se é uma playlist ou álbum
            if (
              ["PLAYLISTS", "ALBUNS", "ALBUM"].includes(
                item.categoria.toUpperCase(),
              )
            ) {
              let acaoHtml = "";

              // Se o link começar com "PL", é uma playlist do YouTube
              if (item.link.startsWith("PL")) {
                acaoHtml = `onclick="abrirPlayerYoutube('${item.link}'); return false;" href="#"`;
              } else {
                // Se não, é um link normal (álbum para download ou site externo)
                acaoHtml = `href="${item.link}" target="_blank"`;
              }

              cont.innerHTML += `
            <a ${acaoHtml} class="album-card">
                <img src="${item.capa || "https://i.postimg.cc/RhnRhFNj/Logo-STP.png"}" class="album-capa">
                <strong>${item.artista}</strong><br>
                <small>${item.titulo}</small>
            </a>
          `;
            }
          });
        } catch (e) {
          console.error("Erro ao carregar ficheiro:", e);
        }

        // Loader
        const loader = document.getElementById("loader-overlay");
        if (loader) {
          loader.style.opacity = "0";
          setTimeout(() => {
            loader.style.display = "none";
          }, 500);
        }
      };
    </script>
  </body>
</html>
